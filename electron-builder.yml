appId: com.zerojunek.deskflow
productName: Deskflow
copyright: Copyright © 2026 ZeroJuneK

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.productivity
  identity: null

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: deb
      arch: [x64]
    - target: AppImage
      arch: [x64]
  category: Utility

extraMetadata:
  version: 0.2.0
