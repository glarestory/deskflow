# GitHub Pages 자동 배포 — master 푸시 시 web-dist 빌드 후 gh-pages 브랜치에 발행
name: Deploy Web

on:
  push:
    branches: [master]
    paths:
      - 'src/renderer/**'
      - 'vite.web.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Publish to gh-pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Vite 는 .env 파일에서만 VITE_* 환경변수를 로드한다(process.env 미사용).
      # CI 에는 .env 가 없으므로 Secrets 로부터 빌드 직전에 동적 생성한다.
      - name: Create .env from Secrets
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          # 진단: 각 secret 의 byte 길이만 출력 (값은 ::add-mask:: 로 마스킹됨)
          echo "API_KEY len:           ${#VITE_FIREBASE_API_KEY}"
          echo "AUTH_DOMAIN len:       ${#VITE_FIREBASE_AUTH_DOMAIN}"
          echo "PROJECT_ID len:        ${#VITE_FIREBASE_PROJECT_ID}"
          echo "STORAGE_BUCKET len:    ${#VITE_FIREBASE_STORAGE_BUCKET}"
          echo "MESSAGING_SENDER_ID len: ${#VITE_FIREBASE_MESSAGING_SENDER_ID}"
          echo "APP_ID len:            ${#VITE_FIREBASE_APP_ID}"
          {
            printf 'VITE_FIREBASE_API_KEY=%s\n' "$VITE_FIREBASE_API_KEY"
            printf 'VITE_FIREBASE_AUTH_DOMAIN=%s\n' "$VITE_FIREBASE_AUTH_DOMAIN"
            printf 'VITE_FIREBASE_PROJECT_ID=%s\n' "$VITE_FIREBASE_PROJECT_ID"
            printf 'VITE_FIREBASE_STORAGE_BUCKET=%s\n' "$VITE_FIREBASE_STORAGE_BUCKET"
            printf 'VITE_FIREBASE_MESSAGING_SENDER_ID=%s\n' "$VITE_FIREBASE_MESSAGING_SENDER_ID"
            printf 'VITE_FIREBASE_APP_ID=%s\n' "$VITE_FIREBASE_APP_ID"
          } > .env
          echo "Wrote $(grep -c '^VITE_FIREBASE_' .env) Firebase keys to .env"
          echo ".env byte size: $(wc -c < .env)"

      - name: Build web bundle
        run: npm run build:web

      - name: Verify Firebase key is bundled
        run: |
          MATCHES=$(grep -hoE 'AIza[A-Za-z0-9_-]{35}' web-dist/assets/*.js | sort -u | wc -l)
          echo "Distinct Firebase API key matches in bundle: $MATCHES"
          if [ "$MATCHES" -lt 1 ]; then
            echo "::error::Firebase API key not bundled — env injection failed"
            echo "--- .env state ---"
            test -f .env && wc -l .env || echo "no .env"
            exit 1
          fi

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web-dist
          publish_branch: gh-pages
          commit_message: 'deploy: web-dist ${{ github.sha }} [skip ci]'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
